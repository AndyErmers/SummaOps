name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build static site
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          GITHUB_PAGES_BASE_PATH: ${{ github.event.repository.name }}
          NEXT_PUBLIC_SUPABASE_URL: https://fbcwvwukdeqowtcuzrgn.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZiY3d2d3VrZGVxb3d0Y3V6cmduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MTgwNzAsImV4cCI6MjA5ODQ5NDA3MH0.wKSA-r0GNKGgC4Wa69ThD05SH7Sy4Hizt0lY_SlpZ1M

      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
